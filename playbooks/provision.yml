---
- name: Provision CareFortress guest VMs
  hosts: carefortress_guests
  become: true

  vars:
    standard_packages:
      - curl
      - wget
      - unzip
      - net-tools
      - htop
      - ufw
      - python3-pip
    timezone: UTC

  tasks:
    - name: Configure DNS resolvers
      copy:
        dest: /etc/resolv.conf
        content: |
          nameserver 8.8.8.8
          nameserver 1.1.1.1
        owner: root
        group: root
        mode: '0644'

    - name: Set system timezone
      timezone:
        name: "{{ timezone }}"

    - name: Install standard packages
      apt:
        name: "{{ standard_packages }}"
        state: present
        update_cache: yes

    - name: Enable UFW and allow SSH
      ufw:
        rule: allow
        name: OpenSSH

    - name: Enable UFW
      ufw:
        state: enabled
        policy: deny

    - name: Disable password authentication in sshd
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
        state: present
      notify: Restart sshd

  handlers:
    - name: Restart sshd
      service:
        name: ssh
        state: restarted
