---
- name: Provision CareFortress guest VMs
  hosts: carefortress_guests
  become: true

  tasks:
    - name: Configure DNS resolvers
      copy:
        dest: /etc/resolv.conf
        content: |
          nameserver 8.8.8.8
          nameserver 1.1.1.1
        owner: root
        group: root
        mode: '0644'
